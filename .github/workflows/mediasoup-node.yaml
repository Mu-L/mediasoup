name: mediasoup-node

on:
  push:
    branches: [v3]
    paths:
      - 'node/**'
      - 'worker/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'npm-scripts.mjs'
      - '.github/workflows/mediasoup-node.yaml'
  pull_request:
    paths:
      - 'node/**'
      - 'worker/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'npm-scripts.mjs'
      - '.github/workflows/mediasoup-node.yaml'
  workflow_dispatch:

concurrency:
  # Cancel a currently running workflow from the same PR, branch or tag when a
  # new workflow is triggered.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    strategy:
      matrix:
        build:
          - os: ubuntu-24.04
            node: 22
            cc: gcc
            cxx: g++
          - os: ubuntu-24.04
            node: 24
            cc: gcc
            cxx: g++
            meson_args: '-Db_sanitize=address'
          - os: ubuntu-24.04
            node: 24
            cc: clang
            cxx: clang++
            meson_args: '-Db_sanitize=undefined'
          - os: ubuntu-24.04
            node: 24
            cc: gcc
            cxx: g++
            meson_args: '-Db_sanitize=thread'
          - os: ubuntu-24.04-arm
            node: 22
            cc: gcc
            cxx: g++
          - os: ubuntu-24.04-arm
            node: 24
            cc: gcc
            cxx: g++
            meson_args: '-Db_sanitize=address'
            # In Ubuntu 24.04 ARM in Debug build type with ASAN, createWorker()
            # takes too long.
            # See https://github.com/versatica/mediasoup/pull/1503.
            skip-test-in-debug-build-type: true
          - os: ubuntu-24.04-arm
            node: 24
            cc: gcc
            cxx: g++
            meson_args: '-Db_sanitize=thread'
          - os: macos-15
            node: 24
            cc: clang
            cxx: clang++
          - os: windows-2022
            node: 22
            cc: cl
            cxx: cl
          - os: windows-2025
            node: 24
            cc: cl
            cxx: cl
        build-type:
          - Release
          - Debug

    runs-on: ${{ matrix.build.os }}

    env:
      CC: ${{ matrix.build.cc }}
      CXX: ${{ matrix.build.cxx }}
      MEDIASOUP_SKIP_WORKER_PREBUILT_DOWNLOAD: 'true'
      MEDIASOUP_LOCAL_DEV: 'true'
      MEDIASOUP_BUILDTYPE: ${{ matrix.build-type }}
      MESON_ARGS: ${{ matrix.build.meson_args }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.build.node }}

      - name: Configure cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
          key: ${{ matrix.build.os }}-node-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ matrix.build.os }}-node-

      - name: npm ci --foreground-scripts
        run: npm ci --foreground-scripts
        env:
          # Disable leak detection because it's detected by the tool flatc uses
          # to build.
          ASAN_OPTIONS: 'detect_leaks=0 symbolize=1 detect_stack_use_after_return=1 strict_init_order=1 check_initialization_order=1 detect_container_overflow=1'

      - name: npm audit --omit dev
        run: npm audit --omit dev

      - if: ${{ matrix.build-type == 'Release' }}
        name: npm run worker:prebuild
        run: npm run worker:prebuild

      - name: npm run lint:node
        run: npm run lint:node

      - if: ${{ !matrix.build.skip-test-in-debug-build-type || matrix.build-type != 'Debug' }}
        name: npm run test:node
        run: npm run test:node

      - name: npm run worker:prebuild-name
        run: npm run worker:prebuild-name
