name: mediasoup-rust

on:
  push:
    branches: [v3]
    paths:
      - 'rust/**'
      - 'worker/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/mediasoup-rust.yaml'
  pull_request:
    paths:
      - 'rust/**'
      - 'worker/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/mediasoup-rust.yaml'
  workflow_dispatch:

concurrency:
  # Cancel a currently running workflow from the same PR, branch or tag when a
  # new workflow is triggered.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    strategy:
      matrix:
        build:
          - os: ubuntu-24.04
          - os: ubuntu-24.04-arm
          - os: macos-15
          - os: windows-2022
          - os: windows-2025

    runs-on: ${{ matrix.build.os }}

    env:
      KEEP_BUILD_ARTIFACTS: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.build.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

      - name: cargo clippy --all-targets -- -D warnings
        run: cargo clippy --all-targets -- -D warnings

      # NOTE: In Windows this will build and test libmediasoupworker in release
      # mode twice since build.rs doesn't allow debug mode on Windows.
      - name: cargo test
        run: |
          cargo test --verbose
          cargo test --release --verbose

      - name: cargo doc --locked --all --no-deps --lib
        run: cargo doc --locked --all --no-deps --lib
        env:
          DOCS_RS: '1'
          RUSTDOCFLAGS: '-D rustdoc::broken-intra-doc-links -D rustdoc::private_intra_doc_links'
