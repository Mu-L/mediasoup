name: mediasoup-rust

on:
  push:
    branches: [v3]
    paths:
      - 'rust/**'
      - 'worker/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'rust-scripts.mjs'
      - '.github/workflows/mediasoup-rust.yaml'
  pull_request:
    paths:
      - 'rust/**'
      - 'worker/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'rust-scripts.mjs'
      - '.github/workflows/mediasoup-rust.yaml'
  workflow_dispatch:

concurrency:
  # Cancel a currently running workflow from the same PR, branch or tag when a
  # new workflow is triggered.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    strategy:
      # Here we want to see all errors, not just the first one.
      fail-fast: false
      matrix:
        build:
          - os: ubuntu-24.04
            run-test-in-debug-mode: true
          - os: ubuntu-24.04-arm
            run-test-in-debug-mode: true
          - os: ubuntu-26.04
            run-cargo-fmt: true
            run-cargo-dry-run: true
            run-test-in-debug-mode: true
          - os: ubuntu-26.04-arm
            run-test-in-debug-mode: true
          - os: macos-15
            run-test-in-debug-mode: true
          - os: windows-2022
          - os: windows-2025

    runs-on: ${{ matrix.build.os }}

    timeout-minutes: 60

    env:
      MEDIASOUP_LOCAL_DEV: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.build.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.build.os }}-cargo-

      - if: ${{ matrix.build.run-cargo-fmt }}
        name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

      - name: cargo clippy --all-targets -- -D warnings
        run: cargo clippy --all-targets -- -D warnings

      # NOTE: On Windows build.rs builds and tests libmediasoupworker in release
      # mode even for a debug `cargo test`, so running the debug pass there would
      # just build and test the release library a second time. Hence the debug
      # pass only runs where debug mode is actually different (non-Windows). The
      # release pass always runs.
      - if: ${{ matrix.build.run-test-in-debug-mode }}
        name: cargo test --verbose
        run: cargo test --verbose

      - name: cargo test --release --verbose
        run: cargo test --release --verbose

      - name: cargo doc --locked --all --no-deps --lib
        run: cargo doc --locked --all --no-deps --lib
        env:
          DOCS_RS: '1'
          RUSTDOCFLAGS: '-D rustdoc::broken-intra-doc-links -D rustdoc::private_intra_doc_links'

      # NOTE: Only run the publish dry-run when at least one of the three crates
      # has a version not yet on crates.io (i.e. it's been bumped and is about to
      # be published). Otherwise Cargo resolves the dependencies among them
      # against the already-published copies on crates.io, and any schema/API
      # change made since the last release fails verification spuriously even
      # though nothing is being published.
      - if: ${{ matrix.build.run-cargo-dry-run }}
        id: check-versions
        name: Check whether any Rust crate version was bumped
        shell: bash
        run: |
          set -euo pipefail
          bumped=false
          check() {
            local manifest="$1" name version status
            name=$(grep -m1 -E '^name *=' "$manifest" | sed -E 's/.*"(.*)".*/\1/')
            version=$(grep -m1 -E '^version *=' "$manifest" | sed -E 's/.*"(.*)".*/\1/')
            status=$(curl -sS -o /dev/null -w '%{http_code}' \
              -A 'mediasoup-ci (https://github.com/versatica/mediasoup)' \
              "https://crates.io/api/v1/crates/${name}/${version}" || echo 000)
            echo "${name} ${version} -> HTTP ${status}"
            if [ "${status}" = "200" ]; then
              echo "  already published, no bump"
            else
              echo "  not published (or unreachable), treating as bumped"
              bumped=true
            fi
          }
          check worker/Cargo.toml
          check rust/Cargo.toml
          check rust/types/Cargo.toml
          echo "bumped=${bumped}" >> "$GITHUB_OUTPUT"

      # NOTE: No need to unset the job-level MEDIASOUP_LOCAL_DEV here:
      # `mediasoup-sys`'s build.rs detects the `cargo publish` verification step
      # and always cleans the Meson subprojects it extracts into the source
      # tree, avoiding the "Source directory was modified by build.rs" error.
      # NOTE: Passing the three crates together as a single group (a
      # `package-workspace` feature, stable since Rust 1.90) makes Cargo resolve
      # the dependencies among them against the locally packaged copies instead
      # of crates.io. This way `mediasoup` verifies fine even when the versions
      # of `mediasoup-sys` / `mediasoup-types` it depends on have been bumped but
      # not yet published.
      - if: ${{ matrix.build.run-cargo-dry-run && steps.check-versions.outputs.bumped == 'true' }}
        name: cargo publish --dry-run -p mediasoup-types -p mediasoup-sys -p mediasoup
        run: cargo publish --dry-run -p mediasoup-types -p mediasoup-sys -p mediasoup
